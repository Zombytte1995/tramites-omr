apiVersion: apps/v1
kind: Deployment
metadata:
  name: tramites-app
  namespace: tramites-omr
  labels:
    app.kubernetes.io/name: tramites-omr
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tramites-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: tramites-app
        app.kubernetes.io/component: frontend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: tramites-app
                topologyKey: kubernetes.io/hostname

      containers:
        - name: tramites-app
          # VITE_API_URL debe inyectarse en build-time (ARG de Docker).
          # La imagen ya lleva el bundle compilado con la URL correcta.
          # En CI/CD: docker build --build-arg VITE_API_URL=https://api.dominio.com ...
          image: gcr.io/PROJECT_ID/tramites-app:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"

          # nginx sirve archivos estáticos — si responde 200, el pod está ok.
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

      terminationGracePeriodSeconds: 10
