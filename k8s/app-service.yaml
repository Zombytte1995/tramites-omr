apiVersion: v1
kind: Service
metadata:
  name: tramites-app-svc
  namespace: tramites-omr
  labels:
    app.kubernetes.io/name: tramites-omr
    app.kubernetes.io/component: frontend
spec:
  # NodePort es requerido por GKE Ingress (HTTP Load Balancer).
  # ClusterIP no funciona como backend de GKE Ingress clásico.
  type: NodePort
  selector:
    app: tramites-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
