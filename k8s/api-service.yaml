apiVersion: v1
kind: Service
metadata:
  name: tramites-api-svc
  namespace: tramites-omr
  labels:
    app.kubernetes.io/name: tramites-omr
    app.kubernetes.io/component: api
spec:
  # ClusterIP: solo accesible dentro del cluster.
  # El Ingress enruta /api/* hacia este servicio.
  type: ClusterIP
  selector:
    app: tramites-api
  ports:
    - name: http
      protocol: TCP
      port: 80          # puerto que expone el Service dentro del cluster
      targetPort: http  # named port del contenedor (8000)
