server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compresión gzip ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff2;

    # ── Cache: assets con hash en el nombre (inmutables) ──────────────────────
    # Vite genera nombres como /assets/main-BfGyeCUZ.js
    # "immutable" indica que el navegador no necesita revalidar nunca.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Cache: index.html nunca debe cachearse ─────────────────────────────────
    # Es el punto de entrada del SPA; debe estar siempre actualizado.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── SPA routing ───────────────────────────────────────────────────────────
    # Intenta servir el archivo real; si no existe, devuelve index.html.
    # Esto permite que Vue Router maneje /tramites/123 sin un 404 de nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Headers de seguridad básicos ──────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
