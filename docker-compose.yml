name: tramites-omr

# ── Servicios ─────────────────────────────────────────────────────────────────
services:

  # ── API Laravel ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./tramites-api
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      APP_NAME: "Trámites OMR"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "${API_APP_KEY}"
      APP_URL: "http://localhost:${API_PORT:-8000}"

      # Base de datos: SQLite por defecto (sin dependencias externas).
      # Para PostgreSQL: descomenta el servicio postgres al final y
      # cambia las variables DB_* a las del bloque comentado.
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite

      # DB_CONNECTION: pgsql
      # DB_HOST: postgres
      # DB_PORT: 5432
      # DB_DATABASE: tramites_omr
      # DB_USERNAME: omr
      # DB_PASSWORD: "${POSTGRES_PASSWORD:-omr_secret}"

      JWT_SECRET: "${API_JWT_SECRET}"
      JWT_TTL: "60"

      GEMINI_API_KEY: "${API_GEMINI_API_KEY:-}"

      CACHE_DRIVER: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file

      PORT: "8000"
    # Al arrancar: crea el archivo SQLite, migra desde cero y siembra datos
    # de demo. migrate:fresh garantiza un estado limpio y predecible.
    command: >
      /bin/sh -c "
        mkdir -p /var/www/html/database &&
        touch /var/www/html/database/database.sqlite &&
        php artisan migrate:fresh --seed --force &&
        php artisan serve --host=0.0.0.0 --port=$${PORT:-8000}
      "
    volumes:
      # Persiste la base de datos SQLite entre reinicios del contenedor.
      # Si cambias a PostgreSQL puedes eliminar este volumen.
      - api_database:/var/www/html/database
      - api_storage:/var/www/html/storage
    networks:
      - omr-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/instituciones > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend Vue + nginx ──────────────────────────────────────────────────────
  app:
    build:
      context: ./tramites-app
      dockerfile: Dockerfile
      args:
        # VITE_API_URL se incrusta en el bundle durante el build de Vite.
        # Debe ser la URL que el NAVEGADOR (no Docker) puede alcanzar.
        VITE_API_URL: "${VITE_API_URL:-http://localhost:8000/api}"
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - omr-network

  # ── PostgreSQL (opcional) ─────────────────────────────────────────────────────
  # Para activar:
  #   1. Descomenta este bloque completo (quita el #).
  #   2. En el servicio "api", comenta las variables DB_* de sqlite
  #      y descomenta las de pgsql.
  #   3. Descomenta el volumen "postgres_data" en la sección volumes.
  #   4. Asegúrate de tener POSTGRES_PASSWORD en tu .env.
  #
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: tramites_omr
  #     POSTGRES_USER: omr
  #     POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-omr_secret}"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - omr-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U omr -d tramites_omr"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

# ── Volúmenes ──────────────────────────────────────────────────────────────────
volumes:
  api_database:
  api_storage:
  # postgres_data:

# ── Red ───────────────────────────────────────────────────────────────────────
networks:
  omr-network:
    driver: bridge
